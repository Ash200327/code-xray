services:
  database:
    image: pgvector/pgvector:pg16
    container_name: codeassistant-db-prod
    environment:
      POSTGRES_USER: codeassistant
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: codeassistant_db
    volumes:
      - pgvector_prod_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeassistant"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./codebase-assistant-api
      dockerfile: Dockerfile
    container_name: codeassistant-backend-prod
    depends_on:
      database:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_HOST=database
      - DB_PORT=5432
      - DB_NAME=codeassistant_db
      - DB_USERNAME=codeassistant
      - DB_PASSWORD=${DB_PASSWORD}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ALLOWED_ORIGINS=*
      - JWT_SECRET=${JWT_SECRET}
    restart: always

  frontend:
    build:
      context: ./codebase-assistant-ui
      dockerfile: Dockerfile.prod
      args:
        - VITE_API_BASE_URL=
        - VITE_WS_URL=
    container_name: codeassistant-frontend-prod
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  pgvector_prod_data:
