services:
  # ─── Spring Boot API ────────────────────────────────────────────────────────
  - type: web
    name: code-xray-api
    runtime: docker
    dockerfilePath: ./codebase-assistant-api/Dockerfile
    plan: free
    region: singapore  # change to oregon / frankfurt if preferred
    healthCheckPath: /actuator/health
    envVars:
      # ── Database (Supabase / Render Postgres) ──
      - key: DB_HOST
        sync: false          # fill in Render dashboard → Environment
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      # ── OpenAI ────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      # ── JWT ───────────────────────────────────
      - key: CODEASSISTANT_SECURITY_JWT_SECRET
        sync: false
      # ── Spring profile ────────────────────────
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      # ── CORS: allow your Vercel frontend URL ──
      - key: ALLOWED_ORIGINS
        sync: false
