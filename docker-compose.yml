services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: codeassistant-pgvector
    environment:
      POSTGRES_USER: codeassistant
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: codeassistant_db
    ports:
      - "5433:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeassistant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
